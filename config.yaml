server:
  port: 3000
  host: 127.0.0.1

upstreams:
  - name: claude-pro
    type: anthropic
    baseurl: https://api.anthropic.com
    key: sk-ant-xxx-your-key-here
    model: claude-sonnet-4-5-20250929
    weight: 3
    enabled: true

  - name: cursor-plan
    type: openai
    baseurl: https://api2.cursor.sh
    key: sk-xxx-your-key-here
    model: gpt-4o
    weight: 2
    enabled: true

  - name: backup
    type: openai
    baseurl: https://api.example.com
    key: sk-xxx-your-key-here
    model: gpt-4o-mini
    weight: 1
    enabled: false

routing:
  strategy: load-balance  # load-balance | rules | manual
  defaultUpstream: claude-pro  # for manual strategy
  rules:
    - match:
        header: "X-Upstream: cursor"
      upstream: cursor-plan

  failover:
    enabled: true
    maxRetries: 2
    timeout: 30000